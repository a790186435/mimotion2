name: Sync from Parent Repository (Keep Tokens & Self)

on:
  workflow_dispatch:
    inputs:
      parent_repo:
        description: '父仓库地址'
        required: true
        default: 'https://github.com/TonyJiangWJ/mimotion.git'
        type: string
      parent_branch:
        description: '父仓库分支'
        required: false
        default: 'master'
        type: string
      target_branch:
        description: '当前仓库目标分支'
        required: false
        default: 'master'
        type: string
      commit_message:
        description: '提交信息'
        required: false
        default: 'Sync from parent repository (keep encrypted_tokens.data & sync-repo.yml)'
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_branch }}
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Initialize Fork Relationship
        run: |
          # 检查是否已关联父仓库
          if git remote -v | grep -q "parent"; then
            echo "✅ Parent repository already linked"
          else
            git remote add parent ${{ inputs.parent_repo }}
            git fetch parent ${{ inputs.parent_branch }}
            # 创建关联提交（可选）
            git commit --allow-empty -m "Initialize fork relationship with ${{ inputs.parent_repo }}"
            git push origin HEAD:${{ inputs.target_branch }}
            echo "✅ Parent repository linked successfully"
          fi

      - name: Backup protected files
        run: |
          PROTECTED_FILES=("encrypted_tokens.data" ".github/workflows/sync-repo.yml")
          for file in "${PROTECTED_FILES[@]}"; do
            if [ -f "$file" ]; then
              cp "$file" "/tmp/$(basename "$file").bak"
              echo "✅ Backed up $file"
            else
              echo "⚠️ $file not found in current repo"
            fi
          done

      - name: Merge or Reset to Parent
        run: |
          echo "Attempting to merge parent branch..."
          if git merge parent/${{ inputs.parent_branch }} --allow-unrelated-histories -X theirs -m "${{ inputs.commit_message }}"; then
            echo "✅ Merge successful."
          else
            echo "⚠️ Merge failed or conflicts occurred. Falling back to hard reset..."
            git reset --hard parent/${{ inputs.parent_branch }}
            echo "✅ Hard reset to parent branch completed."
          fi

      - name: Restore protected files
        run: |
          PROTECTED_FILES=("encrypted_tokens.data" ".github/workflows/sync-repo.yml")
          for file in "${PROTECTED_FILES[@]}"; do
            backup_file="/tmp/$(basename "$file").bak"
            if [ -f "$backup_file" ]; then
              mkdir -p "$(dirname "$file")"
              cp "$backup_file" "$file"
              echo "✅ Restored $file from backup."
              if git ls-files --error-unmatch "$file" > /dev/null 2>&1; then
                git add "$file"
                echo "  File staged for commit."
              fi
            else
              echo "ℹ️ No backup found for $file, skipping restore."
            fi
          done

      - name: Commit and Push
        run: |
          if ! git diff --staged --quiet || ! git diff HEAD --quiet; then
            git add .
            git commit -m "${{ inputs.commit_message }}" --allow-empty
            
            echo "Pushing changes to ${{ inputs.target_branch }}..."
            git push origin HEAD:${{ inputs.target_branch }} --force
            echo "✅ Sync completed successfully!"
          else
            echo "No changes to push."
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/*.bak
          git remote remove parent || true
